name: test-game

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:
  pull_request:
    paths:
      - 'games/**.js'

permissions:
  contents: read
  pull-requests: read

jobs:
  test-game:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Log Environment Information
        run: |
          echo "Run started on: $(date)"
          echo "Runner OS: ${{ runner.os }}"
          echo "Workflow Ref: ${{ github.ref }}"
          echo "Base Ref: ${{ github.base_ref }}"
          echo "Head Ref: ${{ github.head_ref }}"
          echo "Event Name: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            games/**.js

      - name: Log Changed Files
        run: |
          echo "Changed Files:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build Engine
        run: |
          bun install --frozen-lockfile
          bun run build
        working-directory: engine

      - name: Check Games
        run: |
          if [ -n "${{ steps.changed-files.outputs.all_changed_files }}" ]; then
            bun run tests/sprigfuzzy_workflow.js ${{ steps.changed-files.outputs.all_changed_files }}
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Running all games (workflow_dispatch)"
            bun run tests/sprigfuzzy_workflow.js
          else
            echo "No game files changed, skipping"
          fi
