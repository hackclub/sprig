name: Duplicate Submission Labeler
on:
  pull_request_target:
    types: [opened, labeled]

jobs:
  label-duplicates:
    # THE FIX: Only run if the 'submission' label is present
    if: contains(github.event.pull_request.labels.*.name, 'submission')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check and Label
        env:
          GH_TOKEN: ${{ github.token }}
          USER_LOGIN: ${{ github.event.pull_request.user.login }}
        run: |
          # Fetch open PRs by author that have the "submission" label
          USER_PRS=$(gh pr list --state open --author "$USER_LOGIN" --label "submission" --json number --jq '.[].number')
          
          PR_COUNT=$(echo "$USER_PRS" | wc -w)

          if [ "$PR_COUNT" -gt 1 ]; then
            for PR_NUM in $USER_PRS; do
              HAS_LABEL=$(gh pr view "$PR_NUM" --json labels --jq '.labels[].name' | grep -i "potential-duplicate" || true)
              if [ -z "$HAS_LABEL" ]; then
                gh pr edit "$PR_NUM" --add-label "potential-duplicate"
              fi
            done
          fi
