name: Sprig Auto Triage
on:
  pull_request_target:
    types: [opened, labeled, synchronized]
  issue_comment:
    types: [created]
  workflow_dispatch: 

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  triage-comment:
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: System Message
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `[Auto Triage] PR detected. Apply \`submission\` label or comment \`/check\` to run validation.`
              });
            } catch (e) { console.log("Initial comment blocked: " + e.message); }

  validate-submission:
    if: |
      (github.event.pull_request && contains(github.event.pull_request.labels.*.name, 'submission')) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/check')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout PR Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.workflow_dispatch.ref || github.sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Run CLI Validation
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            // --- ENGINES ---
            const analyze = (c) => c.replace(/\/\*[\s\S]*? \*\//g, '').replace(/\/\/.*/g, '').replace(/(let|const|var)\s+\w+/g, '$1 VAR').replace(/\s+/g, '').toLowerCase();
            const checkSimilarity = (a, b) => {
              const s1 = analyze(a); const s2 = analyze(b);
              const chunks = (s) => {
                const set = new Set();
                for (let i = 0; i <= s.length - 10; i++) set.add(s.substring(i, i + 10));
                return set;
              };
              const c1 = chunks(s1); const c2 = chunks(s2);
              if (!c1.size || !c2.size) return 0;
              return (2.0 * [...c1].filter(x => c2.has(x)).length) / (c1.size + c2.size);
            };

            let prNumber = context.payload.pull_request?.number || context.payload.issue?.number;
            if (!prNumber) return;

            const { data: pullFiles } = await github.rest.pulls.listFiles({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber,
            });

            let logs = [];
            let isFailed = false;

            for (const file of pullFiles) {
              const filename = path.basename(file.filename);
              
              if (!file.filename.startsWith('games/')) {
                logs.push(`- "${file.filename}" is outside the /games folder.`);
                isFailed = true; continue;
              }
              if (file.status !== 'added') {
                logs.push(`- "${filename}" was modified; only new games are allowed.`);
                isFailed = true; continue;
              }

              if (filename.endsWith('.js')) {
                const content = fs.readFileSync(file.filename, 'utf8');

                // 1. Filename Check
                if (!/^[a-zA-Z0-9-_]+\.js$/.test(filename)) {
                  logs.push(`- Filename "${filename}" should only use letters, numbers, and dashes.`);
                  isFailed = true;
                }

                // 2. ORDER-INDEPENDENT METADATA CHECK
                const required = ['@title:', '@author:', '@description:', '@tags:', '@addedOn:'];
                const missing = required.filter(tag => !content.includes(tag));

                if (missing.length > 0) {
                  logs.push(`- "${filename}" is missing required metadata or colons: ${missing.join(' ')}`);
                  isFailed = true;
                } else {
                  // Values extraction helper
                  const getVal = (tag) => {
                    const regex = new RegExp(`${tag}\\s*([\\s\\S]*?)(?=@\\w+:|\\*\\/)`);
                    const match = content.match(regex);
                    return match ? match[1].trim() : "";
                  };

                  const title = getVal('@title:');
                  const author = getVal('@author:');
                  const addedOn = getVal('@addedOn:');

                  if (title.includes("getting_started") || author.includes("leo, edits")) {
                    logs.push(`- "${filename}" contains template values (getting_started/leo).`);
                    isFailed = true;
                  }

                  const subD = new Date(addedOn);
                  const diff = Math.abs(new Date() - subD) / (1000 * 60 * 60 * 24 * 30.44);
                  if (isNaN(subD.getTime()) || diff > 6) {
                    logs.push(`- The date in "${filename}" is invalid or too old.`);
                    isFailed = true;
                  }
                }

                // 3. API Check
                if ([/document\./i, /window\./i, /alert\(/i, /fetch\(/i].some(r => r.test(content))) {
                  logs.push(`- Forbidden APIs found in "${filename}".`);
                  isFailed = true;
                }

                // 4. Similarity Check
                const gamesList = fs.readdirSync('games').filter(f => f.endsWith('.js'));
                for (const existing of gamesList) {
                  if (file.filename === `games/${existing}`) continue;
                  const score = checkSimilarity(content, fs.readFileSync(path.join('games', existing), 'utf8'));
                  if (score > 0.49) {
                    logs.push(`- High similarity to [${existing}]. Duplicate or remix?`);
                    break;
                  }
                }
              }
            }

            const statusIcon = isFailed ? "❌" : "✅";
            let body = `### ${statusIcon} [Auto Triage] Validation Report\n\`\`\`text\n`;
            body += logs.length ? logs.join('\n') : "Everything looks great!";
            body += "\n```\n";
            
            try {
              await github.rest.issues.createComment({
                issue_number: prNumber, owner: context.repo.owner, repo: context.repo.repo, body
              });
            } catch (e) { console.log("Failed to post comment"); }

            if (isFailed) process.exit(1);
